<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube MP3 İndirici</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      overflow-x: hidden;
    }
    #bg-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }
    #bg-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 50% 30%, rgba(0,255,65,0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, rgba(0,255,255,0.04) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }
    #scanlines {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 65, 0.02) 2px,
        rgba(0, 255, 65, 0.02) 4px
      );
    }
    .container {
      position: relative;
      z-index: 1;
      background: rgba(10,10,30,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 40px;
      width: 94%;
      max-width: 600px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }
    h1 { text-align: center; margin-bottom: 4px; font-size: 22px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 13px; }
    .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .mini-tab { font-size: 12px; padding: 6px 14px; border-radius: 6px; }
    .tab {
      padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer;
      background: rgba(255,255,255,0.05); color: #888; transition: all 0.2s; border: none;
    }
    .tab.active { background: #e94560; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .input-group { display: flex; gap: 10px; }
    input, textarea {
      width: 100%; padding: 10px 14px; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.1); color: #fff; font-size: 14px; outline: none;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 120px; }
    input::placeholder, textarea::placeholder { color: #666; }
    button {
      padding: 10px 20px; border: none; border-radius: 10px;
      background: #e94560; color: #fff; font-size: 14px; cursor: pointer;
      transition: background 0.2s; white-space: nowrap;
    }
    button:hover { background: #d63851; }
    button:disabled { background: #555; cursor: not-allowed; }
    .status { margin-top: 14px; text-align: center; font-size: 14px; }
    .status.error { color: #ff6b6b; }
    .status.success { color: #51cf66; }
    .progress-bar {
      display: none; margin-top: 14px; width: 100%; height: 6px;
      background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
    }
    .progress-fill { height: 100%; width: 0%; background: #e94560; border-radius: 3px; transition: width 0.3s; }
    .download-link { display: none; margin-top: 16px; text-align: center; }
    .download-link a {
      display: inline-block; padding: 12px 32px; background: #51cf66;
      color: #fff; text-decoration: none; border-radius: 10px; font-size: 16px;
    }
    .download-link a:hover { background: #40c057; }
    .results { margin-top: 16px; }
    .result-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 6px;
      cursor: pointer; transition: background 0.2s;
    }
    .result-item:hover { background: rgba(255,255,255,0.12); }
    .result-thumb {
      width: 44px; height: 33px; border-radius: 5px; object-fit: cover; flex-shrink: 0;
      background: rgba(255,255,255,0.05);
    }
    .result-info { flex: 1; min-width: 0; }
    .result-title { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-duration { font-size: 11px; color: #888; margin-top: 2px; }
    .result-download {
      padding: 6px 14px; background: #51cf66; border: none; border-radius: 8px;
      color: #fff; font-size: 12px; cursor: pointer; flex-shrink: 0;
    }
    .result-download:hover { background: #40c057; }

    .batch-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,0.04); border-radius: 8px; margin-bottom: 4px;
      font-size: 13px;
    }
    .batch-status {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
    }
    .batch-status.bekliyor { background: rgba(255,255,255,0.1); }
    .batch-status.aranıyor { background: #fcc419; color: #000; }
    .batch-status.indiriliyor { background: #339af0; color: #fff; }
    .batch-status.tamam { background: #51cf66; color: #fff; }
    .batch-status.hata { background: #ff6b6b; color: #fff; }
    .batch-query { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .batch-error { color: #ff6b6b; font-size: 11px; }
    .batch-dl-link { color: #51cf66; text-decoration: none; font-size: 12px; }
    .batch-dl-link:hover { text-decoration: underline; }
    .pl-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 8px;
      background: rgba(255,255,255,0.03); border-radius: 6px; margin-bottom: 3px; font-size: 12px;
    }
    .pl-item img { width: 36px; height: 27px; border-radius: 4px; object-fit: cover; background: rgba(255,255,255,0.05); }
  </style>
</head>
<body>
  <div id="bg-overlay"></div>
  <div id="bg-canvas"></div>
  <div id="scanlines"></div>
  <div class="container">
    <h1>YouTube MP3 İndirici</h1>
    <p class="subtitle">Şarkı bul, MP3'e dönüştür, indir</p>

    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:12px">
      <button class="tab mini-tab fmt-btn active" data-fmt="mp3" onclick="setFmt('mp3')">MP3</button>
      <button class="tab mini-tab fmt-btn" data-fmt="mp4" onclick="setFmt('mp4')">MP4</button>
      <span id="fmtLabel" style="color:#888;font-size:12px;line-height:34px">Ses</span>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('search')">Ara</button>
      <button class="tab" onclick="switchTab('url')">URL</button>
      <button class="tab" onclick="switchTab('playlist')">Playlist</button>
      <button class="tab" onclick="switchTab('batch')">Toplu İndir</button>
      <button class="tab" onclick="switchTab('spotify')">Spotify</button>
    </div>

    <div id="tab-search" class="tab-content active">
      <div class="input-group">
        <input type="text" id="searchInput" placeholder="Şarkı adı yaz..." onkeydown="if(event.key==='Enter') search()">
        <button id="searchBtn" onclick="search()">Ara</button>
      </div>
      <div class="status" id="searchStatus"></div>
      <div class="results" id="results"></div>
    </div>

    <div id="tab-url" class="tab-content">
      <div class="input-group">
        <input type="text" id="urlInput" placeholder="YouTube URL'si yapıştır...">
        <button id="urlBtn" onclick="startDownload(document.getElementById('urlInput').value)">İndir</button>
      </div>
    </div>

    <div id="tab-spotify" class="tab-content">
      <div class="input-group">
        <input type="text" id="spotifyInput" placeholder="Spotify playlist linkini yapıştır...">
        <button id="spotifyBtn" onclick="importSpotify()">Aktar</button>
      </div>
      <div class="status" id="spotifyStatus"></div>
      <div id="spotifyResult" style="display:none;margin-top:12px"></div>
    </div>

    <div id="tab-playlist" class="tab-content">
      <div class="input-group">
        <input type="text" id="playlistInput" placeholder="YouTube playlist linkini yapıştır...">
        <button id="playlistBtn" onclick="getPlaylist()">Getir</button>
      </div>
      <div class="status" id="playlistStatus"></div>
      <div id="playlistResult" style="display:none;margin-top:12px">
        <div style="margin-bottom:8px">
          <button id="playlistDlAll" onclick="playlistDlAll()" style="display:none;background:#00ff41;color:#000">Tümünü İndir</button>
        </div>
        <div id="playlistItems"></div>
      </div>
    </div>

    <div id="tab-batch" class="tab-content">
      <textarea id="batchInput" placeholder="Her satıra bir şarkı adı yaz&#10;Örnek:&#10;Daft Punk Around the World&#10;Tarkan Şıkıdım&#10;Sezen Aksu Gülümse"></textarea>
      <div style="margin-top:10px">
        <button id="batchBtn" onclick="startBatch()">Hepsini İndir</button>
      </div>
      <div class="status" id="batchStatus"></div>
      <div class="results" id="batchResults"></div>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status" id="dlStatus"></div>
    <div class="download-link" id="downloadLink">
      <a id="downloadAnchor" href="#">MP3 Dosyasını İndir</a>
    </div>
  </div>

  <script>
    let currentFmt = 'mp3';

    function setFmt(fmt) {
      currentFmt = fmt;
      document.querySelectorAll('.fmt-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.fmt === fmt);
      });
      document.getElementById('fmtLabel').textContent = fmt === 'mp3' ? 'Ses' : 'Video (720p)';
    }

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[onclick*="'${name}'"]`).classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    async function search() {
      const query = document.getElementById('searchInput').value.trim();
      const btn = document.getElementById('searchBtn');
      const status = document.getElementById('searchStatus');
      const results = document.getElementById('results');
      status.className = 'status'; status.textContent = '';
      results.innerHTML = '';
      if (!query) { status.className = 'status error'; status.textContent = 'Şarkı adı girin.'; return; }
      if (query.includes('youtube.com') || query.includes('youtu.be')) { startDownload(query); return; }
      btn.disabled = true; status.textContent = 'Aranıyor...';
      try {
        const res = await fetch('/api/search', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        const data = await res.json();
        if (data.results && data.results.length > 0) {
          status.textContent = '';
            data.results.forEach((r, i) => {
            const div = document.createElement('div'); div.className = 'result-item';
            const min = Math.floor((r.duration || 0) / 60);
            const sec = (r.duration || 0) % 60;
            const thumb = `https://i.ytimg.com/vi/${r.id}/hqdefault.jpg`;
            div.innerHTML = `
              <img class="result-thumb" src="${thumb}" loading="lazy" onerror="this.style.display='none'">
              <div class="result-info">
                <div class="result-title">${r.title}</div>
                <div class="result-duration">${min}:${sec.toString().padStart(2,'0')}</div>
              </div>
              <button class="result-download">İndir</button>
            `;
            const btn = div.querySelector('.result-download');
            btn.onclick = (e) => { e.stopPropagation(); startDownload(r.url, r.title); };
            div.onclick = () => startDownload(r.url, r.title);
            results.appendChild(div);
          });
        } else {
          status.className = 'status error';
          status.textContent = data.error || 'Sonuç bulunamadı.';
        }
      } catch (err) {
        status.className = 'status error'; status.textContent = 'Hata: ' + err.message;
      } finally { btn.disabled = false; }
    }

    let pollId = null;

    async function startDownload(url, title) {
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const status = document.getElementById('dlStatus');
      const downloadLink = document.getElementById('downloadLink');
      if (pollId) clearInterval(pollId);
      status.className = 'status'; status.textContent = '';
      downloadLink.style.display = 'none'; progressBar.style.display = 'none'; progressFill.style.width = '0%';
      if (!url) { status.className = 'status error'; status.textContent = 'Bir sonuç seçin veya URL girin.'; return; }
      document.querySelectorAll('#results .result-item').forEach(e => e.classList.remove('selected'));
      status.textContent = 'İşlem başlatılıyor...';
      try {
        const res = await fetch('/api/download', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, title, format: currentFmt })
        });
        const data = await res.json();
        if (!data.success) {
          status.className = 'status error'; status.textContent = 'Hata: ' + (data.error || 'Bilinmeyen hata');
          return;
        }
        status.textContent = 'İndiriliyor ve dönüştürülüyor...'; progressBar.style.display = 'block';
        pollId = setInterval(async () => {
          try {
            const sRes = await fetch(`/api/status/${data.id}`);
            const sData = await sRes.json();
            progressFill.style.width = sData.progress + '%';
            if (sData.status === 'completed') {
              clearInterval(pollId); pollId = null;
              status.className = 'status success'; status.textContent = 'Dönüştürme tamamlandı!';
              document.getElementById('downloadAnchor').href = sData.downloadUrl;
              downloadLink.style.display = 'block';
            } else if (sData.status === 'error') {
              clearInterval(pollId); pollId = null;
              status.className = 'status error'; status.textContent = 'Hata: ' + (sData.error || 'İndirme başarısız oldu.');
              progressBar.style.display = 'none';
            }
          } catch (e) { clearInterval(pollId); pollId = null; status.className = 'status error'; status.textContent = 'Bağlantı hatası.'; }
        }, 1000);
      } catch (err) { status.className = 'status error'; status.textContent = 'Bağlantı hatası: ' + err.message; }
    }

    async function startBatch() {
      const input = document.getElementById('batchInput');
      const btn = document.getElementById('batchBtn');
      const status = document.getElementById('batchStatus');
      const results = document.getElementById('batchResults');

      const songs = input.value.split('\n').map(s => s.trim()).filter(s => s);
      if (songs.length === 0) { status.className = 'status error'; status.textContent = 'En az bir şarkı adı girin.'; return; }

      btn.disabled = true; status.className = 'status'; status.textContent = 'Başlatılıyor...'; results.innerHTML = '';

      try {
        const res = await fetch('/api/batch', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ songs, format: currentFmt })
        });
        const data = await res.json();
        if (!data.success) { status.className = 'status error'; status.textContent = data.error; btn.disabled = false; return; }

        status.textContent = `0 / ${data.total} tamam`;

        songs.forEach((q, i) => {
          const div = document.createElement('div'); div.className = 'batch-item'; div.id = `batch-${i}`;
          div.innerHTML = `
            <div class="batch-status bekliyor" id="bs-${i}">?</div>
            <div class="batch-query">${q}</div>
            <div class="batch-error" id="be-${i}"></div>
          `;
          results.appendChild(div);
        });

        let poll = setInterval(async () => {
          try {
            const sRes = await fetch(`/api/batch-status/${data.batchId}`);
            const sData = await sRes.json();
            status.textContent = `${sData.completed} / ${sData.total} tamam`;
            sData.items.forEach((item, i) => {
              const badge = document.getElementById(`bs-${i}`);
              const errEl = document.getElementById(`be-${i}`);
              if (badge) {
                badge.className = `batch-status ${item.status}`;
                const icons = { bekliyor: '?', aranıyor: '🔍', indiriliyor: '⬇', tamam: '✓', hata: '✗' };
                badge.textContent = icons[item.status] || '?';
              }
              if (errEl) errEl.innerHTML = item.error ? item.error : (item.downloadUrl ? `<a class="batch-dl-link" href="${item.downloadUrl}">İndir</a>` : '');
            });
            if (sData.finished) { clearInterval(poll); status.className = 'status success'; btn.disabled = false; }
          } catch (e) { clearInterval(poll); btn.disabled = false; }
        }, 2000);

      } catch (err) { status.className = 'status error'; status.textContent = 'Hata: ' + err.message; btn.disabled = false; }
    }

    let playlistVideos = [];

    async function getPlaylist() {
      const url = document.getElementById('playlistInput').value.trim();
      const btn = document.getElementById('playlistBtn');
      const status = document.getElementById('playlistStatus');
      const result = document.getElementById('playlistResult');
      const items = document.getElementById('playlistItems');
      const dlAll = document.getElementById('playlistDlAll');

      status.className = 'status'; status.textContent = '';
      result.style.display = 'none'; items.innerHTML = '';
      dlAll.style.display = 'none';

      if (!url) { status.className = 'status error'; status.textContent = 'Playlist linki girin.'; return; }

      btn.disabled = true; status.textContent = 'İşleniyor...';

      try {
        const res = await fetch('/api/playlist', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.videos && data.videos.length > 0) {
          playlistVideos = data.videos;
          status.className = 'status success';
          status.textContent = `${data.videos.length} video bulundu!`;
          dlAll.style.display = 'inline-block';
          dlAll.textContent = `Tümünü İndir (${data.videos.length})`;

          data.videos.forEach((v, i) => {
            const div = document.createElement('div'); div.className = 'pl-item';
            const thumb = `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`;
            div.innerHTML = `
              <span style="color:#888;width:20px">${i+1}</span>
              <img src="${thumb}" loading="lazy" onerror="this.style.display='none'">
              <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.title}</span>
            `;
            items.appendChild(div);
          });
          result.style.display = 'block';
        } else {
          status.className = 'status error';
          status.textContent = data.message || 'Video bulunamadı.';
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = 'Hata: ' + err.message;
      } finally { btn.disabled = false; }
    }

    function playlistDlAll() {
      const names = playlistVideos.map(v => v.title);
      document.getElementById('batchInput').value = names.join('\n');
      switchTab('batch');
      startBatch();
    }

    async function importSpotify() {
      const url = document.getElementById('spotifyInput').value.trim();
      const btn = document.getElementById('spotifyBtn');
      const status = document.getElementById('spotifyStatus');
      const result = document.getElementById('spotifyResult');

      status.className = 'status'; status.textContent = '';
      result.style.display = 'none'; result.innerHTML = '';

      if (!url) { status.className = 'status error'; status.textContent = 'Spotify linki girin.'; return; }

      btn.disabled = true; status.textContent = 'İşleniyor...';

      try {
        const res = await fetch('/api/spotify', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });
        const data = await res.json();

        if (data.songs && data.songs.length > 0) {
          status.className = 'status success';
          status.textContent = `${data.songs.length} şarkı bulundu! Toplu indirime aktarılıyor...`;
          document.getElementById('batchInput').value = data.songs.join('\n');
          result.innerHTML = `<div style="background:rgba(81,207,102,0.1);padding:12px;border-radius:10px;font-size:13px">${data.songs.slice(0,5).map(s => '🎵 ' + s).join('<br>')}${data.songs.length > 5 ? '<br>...ve ' + (data.songs.length - 5) + ' daha' : ''}</div>`;
          result.style.display = 'block';
          switchTab('batch');
        } else if (data.needCredentials) {
          status.className = 'status error';
          status.textContent = 'Spotify API bilgileri gerekli.';
          result.innerHTML = `<div style="background:rgba(255,107,107,0.1);padding:12px;border-radius:10px;font-size:13px;line-height:1.6">
            <b>Spotify API Ayarları:</b><br>
            1. <a href="https://developer.spotify.com/dashboard" target="_blank" style="color:#51cf66">developer.spotify.com</a> adresine git<br>
            2. "Create App" ile uygulama oluştur<br>
            3. Client ID ve Client Secret'ı al<br>
            4. Bunları bilgisayarında şu komutla ayarla:<br>
            <code style="background:rgba(0,0,0,0.3);padding:4px 8px;border-radius:4px;display:inline-block;margin-top:4px">
            set SPOTIFY_CLIENT_ID=xxx&amp;&amp; set SPOTIFY_CLIENT_SECRET=xxx
            </code>
          </div>`;
          result.style.display = 'block';
        } else {
          status.className = 'status error';
          status.textContent = data.message || 'Playlist alınamadı.';
          result.innerHTML = `<div style="background:rgba(255,107,107,0.1);padding:12px;border-radius:10px;font-size:13px">Şarkı adlarını manuel girip <b>Toplu İndir</b> sekmesini kullanabilirsin.</div>`;
          result.style.display = 'block';
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = 'Hata: ' + err.message;
      } finally { btn.disabled = false; }
    }
  </script>

  <script>
    (function() {
      try {
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();

        const w = window.innerWidth, h = window.innerHeight;
        const camera = new THREE.PerspectiveCamera(60, w/h, 0.1, 1000);
        camera.position.set(0, 7, 22);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        canvas.appendChild(renderer.domElement);

        const GREEN = 0x00ff41, CYAN = 0x00ffff;

        // === NEON GRID FLOOR ===
        const grid = new THREE.Group();
        const gs = 36, gd = 18, gstep = gs/gd;
        const gMat = (o) => new THREE.LineBasicMaterial({ color: GREEN, transparent: true, opacity: o });
        for (let i = -gs/2; i <= gs/2; i += gstep) {
          const a = [new THREE.Vector3(i, -6, -gs/2), new THREE.Vector3(i, -6, gs/2)];
          const b = [new THREE.Vector3(-gs/2, -6, i), new THREE.Vector3(gs/2, -6, i)];
          grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(a), gMat(0.12)));
          grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(b), gMat(0.12)));
        }
        // center bright lines
        const cm = new THREE.LineBasicMaterial({ color: GREEN, transparent: true, opacity: 0.35 });
        grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-6,-gs/2),new THREE.Vector3(0,-6,gs/2)]), cm));
        grid.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-gs/2,-6,0),new THREE.Vector3(gs/2,-6,0)]), cm));
        scene.add(grid);

        // === WIREFRAME ICOSAHEDRON (centerpiece) ===
        const ico = new THREE.Mesh(
          new THREE.IcosahedronGeometry(2, 1),
          new THREE.MeshBasicMaterial({ color: GREEN, wireframe: true, transparent: true, opacity: 0.45 })
        );
        ico.position.y = 0;
        scene.add(ico);

        // === WIREFRAME OCTAHEDRON (orbiting satellite) ===
        const oct = new THREE.Mesh(
          new THREE.OctahedronGeometry(1.3),
          new THREE.MeshBasicMaterial({ color: CYAN, wireframe: true, transparent: true, opacity: 0.25 })
        );
        scene.add(oct);

        // === WIREFRAME TETRAHEDRON (inner orbit) ===
        const tet = new THREE.Mesh(
          new THREE.TetrahedronGeometry(0.9),
          new THREE.MeshBasicMaterial({ color: GREEN, wireframe: true, transparent: true, opacity: 0.3 })
        );
        scene.add(tet);

        // === RISING DATA PARTICLES ===
        const pc = 600;
        const pp = new Float32Array(pc * 3);
        const pv = new Float32Array(pc);
        for (let i = 0; i < pc; i++) {
          pp[i*3] = (Math.random()-0.5)*30;
          pp[i*3+1] = -6 + Math.random()*18;
          pp[i*3+2] = (Math.random()-0.5)*30;
          pv[i] = 0.008 + Math.random()*0.02;
        }
        const pg = new THREE.BufferGeometry();
        pg.setAttribute('position', new THREE.BufferAttribute(pp, 3));
        const pm = new THREE.PointsMaterial({
          color: GREEN, size: 0.07, transparent: true, opacity: 0.6,
          blending: THREE.AdditiveBlending, sizeAttenuation: true,
        });
        const pts = new THREE.Points(pg, pm);
        scene.add(pts);

        // === MOUSE TRACKING ===
        let mx = 0, my = 0;
        document.addEventListener('mousemove', (e) => {
          mx = (e.clientX / w) * 2 - 1;
          my = -(e.clientY / h) * 2 + 1;
        });

        // === ANIMATION ===
        let t = 0;
        function animate() {
          requestAnimationFrame(animate);
          t += 0.005;

          // Rotate center ico
          ico.rotation.x += 0.004;
          ico.rotation.y += 0.008;

          // Orbit oct around
          oct.position.x = Math.sin(t*0.6) * 5.5;
          oct.position.z = Math.cos(t*0.6) * 5.5;
          oct.position.y = 1.5 + Math.sin(t*0.4) * 1.5;
          oct.rotation.x += 0.012;
          oct.rotation.z += 0.018;

          // Orbit tet around (inner, opposite direction)
          tet.position.x = Math.sin(t*0.9 + 2) * 3.2;
          tet.position.z = Math.cos(t*0.9 + 2) * 3.2;
          tet.position.y = -0.5 + Math.sin(t*0.7 + 1) * 1.2;
          tet.rotation.y += 0.02;
          tet.rotation.x += 0.015;

          // Rise particles
          const pos = pts.geometry.attributes.position.array;
          for (let i = 0; i < pc; i++) {
            pos[i*3+1] += pv[i];
            if (pos[i*3+1] > 12) {
              pos[i*3+1] = -6;
              pos[i*3] = (Math.random()-0.5)*30;
              pos[i*3+2] = (Math.random()-0.5)*30;
            }
          }
          pts.geometry.attributes.position.needsUpdate = true;

          // Grid pulse
          grid.children.forEach((ch, i) => {
            if (ch.material) ch.material.opacity = 0.1 + Math.sin(t + i*0.3) * 0.04;
          });

          // Camera mouse parallax (subtle)
          const tx = mx * 1.5, ty = my * 1.2 + 6;
          camera.position.x += (tx - camera.position.x) * 0.008;
          camera.position.y += (ty - camera.position.y) * 0.008;
          camera.lookAt(0, 0, 0);

          renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
          const w2 = window.innerWidth, h2 = window.innerHeight;
          camera.aspect = w2/h2;
          camera.updateProjectionMatrix();
          renderer.setSize(w2, h2);
        });
      } catch(e) {
        console.log('3D background error:', e.message);
      }
    })();
  </script>
</body>
</html>
